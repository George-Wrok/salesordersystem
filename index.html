<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業專屬促銷訂購網頁</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #ec4899;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-md: 0.75rem;
            --radius-lg: 1rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        html,
        body {
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- 登入遮罩 --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            /* Glassmorphism */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            width: 90%;
            /* 改成 90% 而不是 100% 避免邊緣貼齊 */
            max-width: 420px;
            box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            /* Deeper shadow */
            text-align: center;
            transform: translateY(0) scale(1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.hidden .login-card {
            transform: translateY(-30px) scale(0.95);
        }

        .login-card h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-md);
            border: 2px solid var(--border);
            background-color: #f8fafc;
            font-size: 1.125rem;
            color: var(--text-main);
            font-weight: 600;
            transition: all 0.3s ease;
            outline: none;
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 2px;
        }

        .form-input:focus {
            border-color: var(--primary);
            background-color: var(--surface);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
            /* Primary colored shadow */
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
            /* Deeper colored shadow on hover */
        }

        .btn:active {
            transform: scale(0.97);
            /* Click scale effect */
            box-shadow: 0 2px 10px rgba(79, 70, 229, 0.4);
        }

        .btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }

        #login-error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            min-height: 1.25rem;
            font-weight: 500;
        }

        /* 載入狀態 */
        .system-status {
            margin-bottom: 1.5rem;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            background: #f1f5f9;
            color: var(--text-muted);
            border: 1px dashed var(--border);
        }

        .db-status-icon {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            margin-right: 6px;
        }

        .db-status-icon.ready {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        /* --- 主版面 --- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .customer-info-bar {
            background: linear-gradient(90deg, #1e293b, #0f172a);
            color: white;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 500;
            display: none;
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
            box-sizing: border-box;
        }

        .customer-info-bar>div {
            flex-wrap: wrap;
            word-break: break-all;
        }

        .customer-info-bar.show {
            display: flex;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        main {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            box-sizing: border-box;
        }

        /* 防止 CSS Grid 因為內部的橫向捲動軸內容而無限撐寬 (Grid Blowout) */
        main>* {
            min-width: 0;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            main {
                padding: 1rem;
                padding-bottom: 80px;
                /* 給底部浮動購物車留空間 */
            }

            .customer-info-bar {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 0.75rem;
                padding: 1rem !important;
                width: 100%;
            }

            .customer-info-bar>div {
                flex-wrap: wrap;
                gap: 0.5rem !important;
                width: 100%;
            }

            header {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 0.75rem;
                padding: 1rem !important;
            }

            .search-container {
                flex-wrap: wrap;
            }

            .search-input {
                max-width: none;
                flex: 1 1 100%;
            }

            .search-btn,
            .search-clear-btn {
                flex: 1;
            }

            .product-list-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .quantity-control {
                width: 100%;
                justify-content: space-between;
                padding: 0.5rem;
            }

            .qty-btn {
                width: 44px;
                /* Larger touch target for mobile */
                height: 44px;
            }

            .qty-input {
                width: 60px;
                font-size: 1.125rem;
            }

            .product-price {
                font-size: 1.5rem;
            }

            .modal-content {
                padding: 1.5rem;
            }

            /* 手機版隱藏原本的右側邊欄 (購物車) */
            .sidebar {
                display: none !important;
            }
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- 搜尋區塊 --- */
        .search-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
            position: relative;
            /* For absolutely positioning the clear button nicely */
        }

        .search-input-wrapper {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
            display: flex;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 2.5rem 0.6rem 1rem;
            /* Right padding for clear 'x' */
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .search-clear-inline {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem;
            display: none;
            /* Hidden by default */
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
            line-height: 1;
        }

        .search-clear-inline:hover {
            color: var(--text-main);
            background: #f1f5f9;
        }

        .search-btn {
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            width: auto;
        }

        /* --- 分類按鈕與產品列表 --- */
        .category-filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            padding: 0.5rem 0 1rem 0;
            /* Add top padding to avoid shadow clipping */
            scrollbar-width: none;
            /* Firefox */
            position: sticky;
            top: 73px;
            /* Header height approx */
            z-index: 40;
            background: linear-gradient(to bottom, var(--background) 80%, transparent);
            /* Fade out */
            margin-top: -0.5rem;
        }

        .category-filters::-webkit-scrollbar {
            display: none;
            /* Safari and Chrome */
        }

        .category-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .category-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }

        .products-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .product-list-item {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.4s ease-out backwards;
            max-width: 100%;
            box-sizing: border-box;
        }

        .product-list-item:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .product-list-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-list-item:hover::before {
            opacity: 1;
        }

        .product-info {
            flex-grow: 1;
        }

        .product-category {
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 0.25rem;
            letter-spacing: 1px;
        }

        .product-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .product-price-container {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .product-original-price {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-decoration: line-through;
        }





        .quantity-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--background);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            padding: 0.25rem;
        }

        .qty-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s ease;
            font-weight: 600;
            user-select: none;
            /* Prevent text selection on double click */
        }

        .qty-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .qty-btn:active {
            transform: scale(0.9);
        }

        .qty-input {
            width: 40px;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-main);
            -moz-appearance: textfield;
            outline: none;
        }

        .qty-input:focus {
            background: #f1f5f9;
            border-radius: 4px;
        }

        /* Animation class for quantity change */
        .pop-animation {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
                color: var(--primary);
            }

            100% {
                transform: scale(1);
            }
        }

        .qty-input::-webkit-outer-spin-button,
        .qty-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* --- 購物車 --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: rgba(255, 255, 255, 0.9);
            /* Glassmorphism */
            backdrop-filter: blur(12px);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 100px;
        }

        .panel-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--background);
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .cart-items::-webkit-scrollbar {
            width: 4px;
        }

        .cart-items::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px dashed var(--border);
            animation: fadeIn 0.3s ease;
        }

        .cart-item-info {
            flex: 1;
            padding-right: 1rem;
        }

        .cart-item-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--text-main);
        }

        .cart-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .cart-item-price {
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
        }

        .empty-cart {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            background: var(--background);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .empty-cart-icon {
            width: 64px;
            height: 64px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .summary-total {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--background);
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .summary-total .price {
            color: var(--secondary);
            font-size: 1.5rem;
        }

        /* --- 手機版底部浮動金額與購物車 --- */
        .mobile-cart-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 1rem;
            z-index: 100;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            animation: slideUp 0.3s ease;
        }

        .mobile-cart-bar.show {
            display: flex;
            /* 透過 JS 控制只有手機且登入後才顯示 */
        }

        @media (min-width: 641px) {
            .mobile-cart-bar.show {
                display: none;
                /* 桌面版永遠隱藏 */
            }
        }

        .mobile-cart-info {
            display: flex;
            flex-direction: column;
        }

        .mobile-cart-count {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .mobile-cart-total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .btn-view-cart {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 2rem;
            font-weight: 600;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
            cursor: pointer;
        }

        /* --- 手機版展開的購物車面板 --- */
        .mobile-cart-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--surface);
            z-index: 1500;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        .mobile-cart-panel.show {
            display: flex;
        }

        .mobile-cart-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .btn-close-cart {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .mobile-cart-body {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: var(--background);
        }

        .mobile-cart-footer {
            padding: 1rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        /* --- 彈出視窗 (Modal) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.show .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--background);
            padding-bottom: 1rem;
        }

        .modal-body {
            margin-bottom: 2rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .modal-body table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .modal-body th,
        .modal-body td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .modal-body th {
            font-weight: 600;
            color: var(--text-main);
            background: #f8fafc;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn-cancel {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-cancel:hover {
            background: #f1f5f9;
            color: var(--text-main);
            transform: none;
            box-shadow: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* --- Toast Notification --- */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .toast {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            pointer-events: auto;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.hide {
            opacity: 0;
            transform: translateX(120%) scale(0.9);
        }

        .toast-success-icon {
            color: #10b981;
        }
    </style>
</head>

<body>
    <!-- Toast 通知容器 -->
    <div id="toast-container" class="toast-container"></div>

    <!-- 登入遮罩 -->
    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <h2>客戶登入中心</h2>
            <p>本系統直接連結 Google Sheets 雲端資料庫</p>

            <div class="system-status" id="sys-status">
                <span class="db-status-icon" id="db-indicator"></span>
                <span id="db-status-text">正在載入雲端資料...</span>
            </div>

            <input type="text" id="login-input" class="form-input" placeholder="請輸入客戶標號 (例: C001)" autocomplete="off"
                onkeydown="if(event.key === 'Enter') handleLogin()" disabled>
            <button id="btn-login" class="btn" onclick="handleLogin()" disabled>
                驗證身分並登入
            </button>
            <div id="login-error"></div>
        </div>
    </div>

    <!-- 頂部資訊列 (登入後顯示) -->
    <div id="customer-info-bar" class="customer-info-bar">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" style="color: #38bdf8; flex-shrink: 0;">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span style="display: inline-block;">歡迎回來，<strong id="display-customer-name"
                    style="color: #38bdf8; font-size: 1rem; word-break: break-all;"></strong> (標號: <span
                    id="display-customer-id"></span>)</span>
        </div>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span style="word-break: break-all;">聯絡窗口：<span id="display-customer-contact"></span> / <span
                    id="display-customer-phone"></span></span>
            <button onclick="logout()"
                style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 1rem; transition: background 0.2s; flex-shrink:0;">登出系統</button>
        </div>
    </div>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#logo-grad)" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4f46e5" />
                        <stop offset="100%" stop-color="#ec4899" />
                    </linearGradient>
                </defs>
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            企業促銷下單系統 (Cloud Edition)
        </div>
        <div
            style="font-size: 0.875rem; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 0.5rem;">
            <span class="db-status-icon ready"></span> 雲端資料庫已連線
        </div>
    </header>

    <main>
        <!-- 左側產品列表 -->
        <section>
            <h2 class="section-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                    <line x1="7" y1="7" x2="7.01" y2="7"></line>
                </svg>
                本期專屬促銷方案
            </h2>

            <!-- 搜尋區塊 -->
            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" id="product-search-input" class="search-input" placeholder="輸入商品名稱或型號查詢..."
                        onkeydown="if(event.key === 'Enter') performSearch()" oninput="toggleClearBtn()">
                    <button class="search-clear-inline" id="btn-clear-search" onclick="clearSearch()" title="清除搜尋">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <button class="btn search-btn" onclick="performSearch()">查詢</button>
            </div>

            <!-- 分類按鈕區塊 -->
            <div id="category-filters" class="category-filters">
                <!-- 動態產生 -->
            </div>

            <div class="products-list" id="products-container">
                <!-- 商品列表將由 SQLite 動態產生 -->
            </div>
        </section>

        <!-- 右側購物車 -->
        <aside class="sidebar">
            <div class="panel">
                <h3 class="panel-title">
                    現有訂購明細
                </h3>

                <div class="cart-items" id="cart-container">
                    <div class="empty-cart">
                        <div class="empty-cart-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                        </div>
                        <div>
                            <div style="font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem;">購物車是空的</div>
                            <div style="font-size: 0.85rem;">快去挑選超值的專屬促銷商品吧！</div>
                        </div>
                    </div>
                </div>

                <div class="summary-row">
                    <span>商品總數</span>
                    <span id="summary-count" style="color: var(--text-main); font-weight: 600;">0 項</span>
                </div>

                <div class="summary-row summary-total">
                    <span>結帳總計</span>
                    <span class="price">NT$ <span id="summary-total">0</span></span>
                </div>

                <button id="btn-submit" class="btn" style="margin-top: 1.5rem;" disabled
                    onclick="showConfirmModal()">確認訂單</button>
            </div>
        </aside>
    </main>

    <!-- 手機版底部懸浮列 -->
    <div id="mobile-cart-bar" class="mobile-cart-bar">
        <div class="mobile-cart-info">
            <span class="mobile-cart-count" id="mobile-summary-count">0 項商品</span>
            <span class="mobile-cart-total">NT$ <span id="mobile-summary-total">0</span></span>
        </div>
        <button class="btn-view-cart" onclick="openMobileCart()">查看明細</button>
    </div>

    <!-- 手機版購物車展開面板 -->
    <div id="mobile-cart-panel" class="mobile-cart-panel">
        <div class="mobile-cart-header">
            <span>購物車明細</span>
            <button class="btn-close-cart" onclick="closeMobileCart()">✕</button>
        </div>
        <div class="mobile-cart-body" id="mobile-cart-container">
            <!-- 購物車項目將動態產生至此 -->
        </div>
        <div class="mobile-cart-footer">
            <button class="btn" id="btn-mobile-submit" style="width: 100%;" disabled
                onclick="showConfirmModal()">確認下單</button>
        </div>
    </div>

    <!-- 訂單確認彈出視窗 -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">訂單明細確認</div>
            <div class="modal-body" id="modal-order-details">
                <!-- 訂單明細內容將由 JavaScript 動態產生 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" style="width: auto;" onclick="closeConfirmModal()">返回修改</button>
                <button class="btn" style="width: auto;" id="btn-final-confirm"
                    onclick="confirmSubmitOrder()">確定送出</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 核心：Google Sheets 雲端資料庫
        // ==========================================
        const CUSTOMER_API_URL = "https://script.google.com/macros/s/AKfycbx94HC0BGOGI65zY49hgH1SfNd-n6pthAMZKJVZhKY_7t0qs-Zt4RIu0DE1xyprmETuxQ/exec";
        const PROMO_API_URL = "https://script.google.com/macros/s/AKfycbzlluNWg60I6cLZ_Tzfde4oABj31cNJzS8dAGkPM6MOzTdsvLCBV_5ghpGwkNqMoj6e/exec";

        let customersData = [];
        let rawPromoList = [];
        let cart = {};        // 購物車狀態
        let currentCustomer = null;
        let allProducts = []; // 儲存所有商品資料以供分類篩選
        let currentCategory = '全部商品';
        let currentSearchTerm = ''; // 當前搜尋關鍵字

        // 初始化資料庫 (從 Google Sheet)
        async function initDatabase() {
            try {
                document.getElementById('db-status-text').textContent = "正在載入雲端資料庫...";

                const [resCustomers, resPromo] = await Promise.all([
                    fetch(CUSTOMER_API_URL),
                    fetch(PROMO_API_URL)
                ]);

                if (!resCustomers.ok || !resPromo.ok) {
                    throw new Error("無法連接至 Google Sheets 資料來源");
                }

                const rawCustomersInfo = await resCustomers.json();
                const rawPromoInfo = await resPromo.json();

                customersData = Array.isArray(rawCustomersInfo) ? rawCustomersInfo : (rawCustomersInfo.data || Object.values(rawCustomersInfo)[0] || []);
                rawPromoList = Array.isArray(rawPromoInfo) ? rawPromoInfo : (rawPromoInfo.data || Object.values(rawPromoInfo)[0] || []);

                console.log("✅ Google Sheets 資料已載入完畢！");

                // 更新 UI 狀態，允許登入
                document.getElementById('db-indicator').classList.add('ready');
                document.getElementById('db-status-text').textContent = "系統連線正常，可隨時登入。";
                document.getElementById('db-status-text').style.color = "#10b981";
                document.getElementById('login-input').disabled = false;
                document.getElementById('btn-login').disabled = false;
                document.getElementById('login-input').focus();

            } catch (err) {
                console.error("初始化資料庫失敗:", err);
                document.getElementById('db-status-text').textContent = `錯誤：${err.message}`;
                document.getElementById('db-status-text').style.color = "#ef4444";
            }
        }

        // ==========================================
        // 前台邏輯與資料查詢
        // ==========================================

        // 登入驗證
        function handleLogin() {
            const inputId = document.getElementById('login-input').value.trim().toUpperCase();
            const errorEl = document.getElementById('login-error');

            if (!inputId) {
                errorEl.textContent = '請輸入客戶標號！';
                return;
            }

            try {
                let matchedObj = null;

                for (let i = 0; i < customersData.length; i++) {
                    const row = customersData[i];
                    // 掃描哪些欄位像 ID (如 'id', '客代', '客戶', '客戶編號')
                    const matchedId = row['id'] || row['客代'] || row['客戶'] || row['客戶編號'] || row['ID'] || row['Customer_ID'];

                    if (String(matchedId).trim().toUpperCase() === inputId) {
                        matchedObj = row;
                        break;
                    }
                }

                if (matchedObj) {
                    // 登入成功
                    currentCustomer = matchedObj;
                    errorEl.textContent = '';

                    // 動態抓取欄位名稱顯示
                    const cId = currentCustomer['id'] || currentCustomer['客代'] || currentCustomer['客戶'] || currentCustomer['客戶編號'] || inputId;
                    const cName = currentCustomer['name'] || currentCustomer['公司名稱'] || currentCustomer['名稱'] || currentCustomer['客戶名稱'] || '-';
                    const cContact = currentCustomer['contact'] || currentCustomer['聯絡人'] || currentCustomer['訂單連絡人'] || '-';
                    const cPhone = currentCustomer['phone'] || currentCustomer['電話'] || currentCustomer['訂單電話'] || '-';

                    // 隱藏登入框
                    document.getElementById('login-overlay').classList.add('hidden');

                    // 顯示客戶資訊
                    document.getElementById('display-customer-id').textContent = cId;
                    document.getElementById('display-customer-name').textContent = cName;
                    document.getElementById('display-customer-contact').textContent = cContact;
                    document.getElementById('display-customer-phone').textContent = cPhone;
                    document.getElementById('customer-info-bar').classList.add('show');

                    showToast(`歡迎回來，${cName}！`, 'success');

                    // 顯示手機版浮動購物車條
                    document.getElementById('mobile-cart-bar').classList.add('show');

                    // 取得促銷品列表並顯示
                    loadProducts();

                    // === 讀取雲端購物車 ===
                    document.getElementById('db-status-text').textContent = "正在同步雲端歷史紀錄...";
                    const GAS_URL = "https://script.google.com/macros/s/AKfycbzyi7MSuX0T0YSPMqTZMObK5J8ePwfM7POiSkmLCyj8Q5rtfAX82wwUdYbmWz0N-vO8/exec";

                    fetch(GAS_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({ action: "fetchCart", customerId: cId })
                    })
                        .then(r => r.json())
                        .then(data => {
                            if (data.status === "success" && data.cart && data.cart.length > 0) {
                                let hasRestored = false;
                                data.cart.forEach(cartItem => {
                                    const p = allProducts.find(x => x.name === cartItem.productName);
                                    if (p) {
                                        cart[p.id] = { product: p, qty: parseInt(cartItem.qty) || 0 };
                                        hasRestored = true;
                                        const inputEl = document.getElementById(`qty-${p.id}`);
                                        if (inputEl) inputEl.value = cart[p.id].qty;
                                    }
                                });
                                if (hasRestored) {
                                    renderCart();
                                    alert("💡 系統已自動幫您載入上次儲存的訂單內容！\n您可以繼續修改商品數量，此次送出會直接覆蓋上一張單。");
                                }
                            }
                        })
                        .catch(e => console.error("獲取雲端紀錄失敗", e))
                        .finally(() => {
                            document.getElementById('db-status-text').textContent = "系統連線正常，可隨時登入。";
                        });
                    // =====================

                } else {
                    errorEl.textContent = '查無此客戶標號，請確認後重試！';
                }
            } catch (err) {
                errorEl.textContent = '資料庫查詢錯誤：' + err.message;
            }
        }


        function logout() {
            currentCustomer = null;
            cart = {};
            document.getElementById('login-input').value = '';
            document.getElementById('login-error').textContent = '';
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('customer-info-bar').classList.remove('show');
            document.getElementById('mobile-cart-bar').classList.remove('show');
            closeMobileCart();
            document.getElementById('products-container').innerHTML = '';
            renderCart();
            document.getElementById('login-input').focus();
        }

        // 查詢並顯示促銷品 (從 Promotion 資料)
        function loadProducts() {
            try {
                // 如果尚未處理過，則解析資料
                if (allProducts.length === 0) {
                    for (let i = 0; i < rawPromoList.length; i++) {
                        const row = rawPromoList[i];

                        // 動態抓取欄位名稱，以相容您從 Excel 匯入的中文欄位名稱
                        const rId = row['id'] || row['編號'] || row['商品代碼'] || `P${allProducts.length + 1}`;
                        const rName = row['name'] || row['商品名稱'] || row['商品型號'] || '未命名商品';
                        const rCat = row['category'] || row['分類'] || '其他分類';

                        // 安全處理價格字串 (移除逗號並轉數字)
                        const rawPromo = row['promo_price'] || row['未稅特價'] || row['特價'] || row['促銷價'] || 0;
                        const rPromoPrice = parseFloat(String(rawPromo).replace(/,/g, '')) || 0;

                        const rawOrig = row['original_price'] || row['牌價'] || row['牌 價'] || row['原價'] || row['定價'];
                        const rOrigPrice = rawOrig ? parseFloat(String(rawOrig).replace(/,/g, '')) : null;

                        // 讀取可能的級距定價 (使用者明確指定的 5 個級距)
                        let priceTiers = [];

                        // 定義您的欄位對照表 (數量門檻 vs 優惠價格)
                        const tierMappings = [
                            { qtyCol: '數量', priceCol: '未稅特價' },
                            { qtyCol: '數差1', priceCol: '特價1' },
                            { qtyCol: '數差2', priceCol: '特價2' },
                            { qtyCol: '數差3', priceCol: '特價3' },
                            { qtyCol: '數差4', priceCol: '特價4' }
                        ];

                        tierMappings.forEach(mapping => {
                            const rawQty = row[mapping.qtyCol];
                            const rawPrice = row[mapping.priceCol];

                            if (rawQty !== undefined && rawQty !== null && rawPrice !== undefined && rawPrice !== null) {
                                const tQty = parseInt(rawQty) || 0;
                                const tPrice = parseFloat(String(rawPrice).replace(/,/g, '')) || 0;

                                if (tQty > 0 && tPrice > 0) {
                                    priceTiers.push({ minQty: tQty, price: tPrice });
                                }
                            }
                        });

                        // 如果完全沒有級距，預設以起跳價格(promo_price) 為 1件 的價格
                        if (priceTiers.length === 0) {
                            priceTiers.push({ minQty: 1, price: rPromoPrice });
                        }

                        // 確保由小到大排序級距
                        priceTiers.sort((a, b) => a.minQty - b.minQty);

                        allProducts.push({
                            id: rId,
                            name: rName,
                            category: rCat,
                            promo_price: rPromoPrice,
                            original_price: rOrigPrice,
                            price_tiers: priceTiers
                        });
                    }
                }

                renderCategories();
                renderProductList();

            } catch (err) {
                document.getElementById('products-container').innerHTML =
                    `<div style="grid-column: 1/-1; color:red;">讀取商品發生錯誤: ${err.message}</div>`;
            }
        }

        function toggleClearBtn() {
            const term = document.getElementById('product-search-input').value;
            const clearBtn = document.getElementById('btn-clear-search');
            if (term.length > 0) {
                clearBtn.style.display = 'flex';
            } else {
                clearBtn.style.display = 'none';
            }
        }

        function performSearch() {
            const term = document.getElementById('product-search-input').value.trim().toLowerCase();
            currentSearchTerm = term;

            toggleClearBtn();

            // 如果搜尋關鍵字有東西，就先把分類切換回全部商品，這樣才能跨分類搜尋
            if (term) {
                currentCategory = '全部商品';
                renderCategories(); // 更新按鈕樣式
            }

            renderProductList();
        }

        function clearSearch() {
            document.getElementById('product-search-input').value = '';
            toggleClearBtn();
            performSearch();
            document.getElementById('product-search-input').focus();
        }

        function renderCategories() {
            const filterContainer = document.getElementById('category-filters');
            filterContainer.innerHTML = '';

            // 提取所有唯一分類
            const categories = ['全部商品', ...new Set(allProducts.map(p => p.category))];

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${currentCategory === cat ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    renderCategories(); // 更新 active 狀態
                    renderProductList(); // 重新渲染列表
                };
                filterContainer.appendChild(btn);
            });
        }

        function renderProductList() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            let filteredProducts = currentCategory === '全部商品'
                ? allProducts
                : allProducts.filter(p => p.category === currentCategory);

            if (currentSearchTerm) {
                filteredProducts = filteredProducts.filter(p =>
                    p.name.toLowerCase().includes(currentSearchTerm) ||
                    p.id.toLowerCase().includes(currentSearchTerm)
                );
            }

            if (filteredProducts.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#64748b; padding: 2rem;">找不到符合條件的促銷商品。</div>';
                return;
            }

            filteredProducts.forEach((product, index) => {
                const qty = cart[product.id] ? cart[product.id].qty : 0;

                // 產生價格級距說明字串 (不顯示滿 1 件的基本定價)
                let tiersHtml = '';
                const displayTiers = product.price_tiers ? product.price_tiers.filter(t => t.minQty > 1) : [];

                if (displayTiers.length > 0) {
                    tiersHtml = '<div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 4px;">';
                    displayTiers.forEach(tier => {
                        tiersHtml += `<span style="background:#f1f5f9; padding: 2px 6px; border-radius:4px; border: 1px solid var(--border); white-space: nowrap;">滿 ${tier.minQty} 件: $${tier.price.toLocaleString()}</span>`;
                    });
                    tiersHtml += '</div>';
                }

                const item = document.createElement('div');
                item.className = 'product-list-item';
                item.style.animationDelay = `${index * 0.05}s`;

                item.innerHTML = `
                    <div class="product-info">
                        <div class="product-title" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                            ${product.name}
                            ${product.original_price ? `<span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500; text-decoration: line-through;">牌價: $${product.original_price.toLocaleString()}</span>` : ''}
                        </div>
                        <div class="product-price-container" style="margin-bottom: 0;">
                            <div class="product-price">$${product.promo_price.toLocaleString()}</div>
                        </div>
                        ${tiersHtml}
                    </div>
                    <div class="quantity-control">
                        <button class="qty-btn" onclick='updateQuantity(${JSON.stringify(product)}, -1)'>-</button>
                        <input type="number" class="qty-input" value="${qty}" id="qty-${product.id}" 
                            onchange='setQuantity(${JSON.stringify(product)}, this.value)' 
                            onfocus="this.select()">
                        <button class="qty-btn" onclick='updateQuantity(${JSON.stringify(product)}, 1)'>+</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // ==========================================
        // 購物車邏輯
        // ==========================================
        window.updateQuantity = function (product, change) {
            const pId = product.id;
            const currentQty = cart[pId] ? cart[pId].qty : 0;
            const newQty = Math.max(0, currentQty + change);
            setQuantity(product, newQty);
        };

        function openMobileCart() {
            document.getElementById('mobile-cart-panel').classList.add('show');
        }

        function closeMobileCart() {
            document.getElementById('mobile-cart-panel').classList.remove('show');
        }

        window.setQuantity = function (product, newQty) {
            const pId = product.id;
            let parsedQty = parseInt(newQty);
            if (isNaN(parsedQty) || parsedQty < 0) parsedQty = 0;

            if (parsedQty === 0) {
                delete cart[pId];
            } else {
                // 如果是新增或增加數量，顯示 Toast
                if (!cart[pId] || cart[pId].qty < parsedQty) {
                    if (parsedQty - (cart[pId] ? cart[pId].qty : 0) > 0) {
                        // Only show toast if user explicitly clicked + (not for bulk updates that don't increase)
                        showToast(`已將 ${product.name} 加入購物車`);
                    }
                }
                cart[pId] = { product, qty: parsedQty };
            }

            const inputEl = document.getElementById(`qty-${pId}`);
            if (inputEl) {
                inputEl.value = parsedQty;
                // Add pop animation class
                inputEl.classList.remove('pop-animation');
                // Trigger reflow to restart animation
                void inputEl.offsetWidth;
                inputEl.classList.add('pop-animation');
            }
            renderCart();
        };

        // --- Toast 系統 ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = 'toast show';

            const iconHtml = type === 'success'
                ? `<svg class="toast-success-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`
                : '';

            toast.innerHTML = `${iconHtml}<span>${message}</span>`;

            container.appendChild(toast);

            // 移除動畫
            setTimeout(() => {
                toast.classList.replace('show', 'hide');
                toast.addEventListener('transitionend', () => {
                    if (toast.parentNode === container) {
                        container.removeChild(toast);
                    }
                });
            }, 3000); // 3 秒後消失
        }

        function renderCart() {
            const container = document.getElementById('cart-container');
            const mobileContainer = document.getElementById('mobile-cart-container');
            const totalEl = document.getElementById('summary-total');
            const countEl = document.getElementById('summary-count');
            const btnSubmit = document.getElementById('btn-submit');

            const mobileTotalEl = document.getElementById('mobile-summary-total');
            const mobileCountEl = document.getElementById('mobile-summary-count');
            const btnMobileSubmit = document.getElementById('btn-mobile-submit');

            const cartProductIds = Object.keys(cart);
            let totalAmount = 0;
            let totalItems = 0;
            let categorySubtotals = {}; // 儲存各分類的小計

            const emptyCartHtml = `
                    <div class="empty-cart" style="margin-top:2rem;">
                         <div class="empty-cart-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                        </div>
                        <div>
                            <div style="font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem;">購物車是空的</div>
                            <div style="font-size: 0.85rem;">快去挑選超值的專屬促銷商品吧！</div>
                        </div>
                    </div>`;

            if (cartProductIds.length === 0) {
                container.innerHTML = emptyCartHtml;
                mobileContainer.innerHTML = emptyCartHtml;
                btnSubmit.disabled = true;
                btnMobileSubmit.disabled = true;

                // 清空分類金額總結
                document.querySelectorAll('.category-breakdown-wrapper').forEach(el => el.remove());

            } else {
                container.innerHTML = '';
                mobileContainer.innerHTML = '';
                btnSubmit.disabled = false;
                btnMobileSubmit.disabled = false;

                cartProductIds.forEach(id => {
                    const item = cart[id];
                    // 計算目前數量對應的單價
                    let currentUnitPrice = item.product.promo_price;
                    if (item.product.price_tiers) {
                        const applicableTier = item.product.price_tiers.slice().reverse().find(t => item.qty >= t.minQty);
                        if (applicableTier) currentUnitPrice = applicableTier.price;
                    }
                    const subtotal = currentUnitPrice * item.qty;

                    totalAmount += subtotal;
                    totalItems += item.qty;

                    // 累加分類金額
                    const cat = item.product.category;
                    categorySubtotals[cat] = (categorySubtotals[cat] || 0) + subtotal;

                    const itemHtml = `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-title">${item.product.name}</div>
                                <div class="cart-item-meta">$${currentUnitPrice.toLocaleString()} × ${item.qty}</div>
                            </div>
                            <div class="cart-item-price">$${subtotal.toLocaleString()}</div>
                        </div>
                    `;

                    container.insertAdjacentHTML('beforeend', itemHtml);
                    mobileContainer.insertAdjacentHTML('beforeend', itemHtml);
                });

                // 產生分類金額總結區塊
                let breakdownHtml = `<div class="category-breakdown-wrapper" style="padding-top: 1rem; border-top: 1px dashed var(--border); margin-top: 1rem; width: 100%;">
                    <div style="font-size: 0.875rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem;">各分類消費總結：</div>`;

                Object.entries(categorySubtotals).forEach(([cat, amount]) => {
                    breakdownHtml += `
                        <div class="summary-row" style="margin-bottom: 0.25rem;">
                            <span>${cat}</span>
                            <span style="color: var(--text-main);">$${amount.toLocaleString()}</span>
                        </div>`;
                });
                breakdownHtml += `</div>`;

                // 若已存在則更新，否則新增加在購物車列表結尾
                document.querySelectorAll('.category-breakdown-wrapper').forEach(el => el.remove());
                container.insertAdjacentHTML('afterend', breakdownHtml);
                mobileContainer.insertAdjacentHTML('afterend', breakdownHtml);
            }

            totalEl.textContent = totalAmount.toLocaleString();
            countEl.textContent = `${totalItems} 項`;

            mobileTotalEl.textContent = totalAmount.toLocaleString();
            mobileCountEl.textContent = `${totalItems} 項`;
        }

        function showConfirmModal() {
            const cartKeys = Object.keys(cart);
            if (cartKeys.length === 0) {
                alert("🛒 您的購物車目前是空的喔！");
                return;
            }

            const customerId = document.getElementById('display-customer-id').textContent;
            const customerName = document.getElementById('display-customer-name').textContent;

            let modalHtml = `<p>請確認以下訂單資訊是否正確：</p>`;
            modalHtml += `<p><strong>客戶標號：</strong> ${customerId} <br> <strong>客戶名稱：</strong> ${customerName}</p>`;

            modalHtml += `<table>
                            <thead>
                                <tr>
                                    <th>商品名稱</th>
                                    <th style="text-align:right;">單價</th>
                                    <th style="text-align:center;">數量</th>
                                    <th style="text-align:right;">小計</th>
                                </tr>
                            </thead>
                            <tbody>`;

            let total = 0;
            cartKeys.forEach(id => {
                const item = cart[id];
                let currentUnitPrice = item.product.promo_price;
                if (item.product.price_tiers) {
                    const applicableTier = item.product.price_tiers.slice().reverse().find(t => item.qty >= t.minQty);
                    if (applicableTier) currentUnitPrice = applicableTier.price;
                }
                const sub = currentUnitPrice * item.qty;
                total += sub;

                modalHtml += `<tr>
                                <td>${item.product.name}</td>
                                <td style="text-align:right;">$${currentUnitPrice.toLocaleString()}</td>
                                <td style="text-align:center;">${item.qty}</td>
                                <td style="text-align:right; font-weight:600; color:var(--text-main);">$${sub.toLocaleString()}</td>
                              </tr>`;
            });

            modalHtml += `</tbody>
                          <tfoot>
                              <tr>
                                  <td colspan="3" style="text-align:right; font-weight:700; padding-top:1rem;">總計結帳金額：</td>
                                  <td style="text-align:right; font-weight:700; color:var(--secondary); font-size:1.25rem; padding-top:1rem;">NT$ ${total.toLocaleString()}</td>
                              </tr>
                          </tfoot>
                        </table>`;

            document.getElementById('modal-order-details').innerHTML = modalHtml;
            document.getElementById('confirm-modal').classList.add('show');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.remove('show');
        }

        function confirmSubmitOrder() {
            const customerId = document.getElementById('display-customer-id').textContent;
            const customerName = document.getElementById('display-customer-name').textContent;
            const cartKeys = Object.keys(cart);

            const btnFinalConfirm = document.getElementById('btn-final-confirm');
            btnFinalConfirm.disabled = true;
            btnFinalConfirm.textContent = '訂單傳送中...';

            const items = cartKeys.map(id => {
                const item = cart[id];
                // 重算正確單價
                let currentUnitPrice = item.product.promo_price;
                if (item.product.price_tiers) {
                    const applicableTier = item.product.price_tiers.slice().reverse().find(t => item.qty >= t.minQty);
                    if (applicableTier) currentUnitPrice = applicableTier.price;
                }
                const sub = currentUnitPrice * item.qty;

                return {
                    productName: item.product.name,
                    price: currentUnitPrice,
                    qty: item.qty,
                    subtotal: sub
                };
            });

            const GAS_URL = "https://script.google.com/macros/s/AKfycbzyi7MSuX0T0YSPMqTZMObK5J8ePwfM7POiSkmLCyj8Q5rtfAX82wwUdYbmWz0N-vO8/exec";
            const payload = {
                action: "saveOrder",
                customerId: customerId,
                customerName: customerName,
                items: items
            };

            fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        alert("✅ 訂單已成功送出！\n\n系統將自動為您登出。");
                        cart = {};
                        renderCart();
                        document.querySelectorAll('.qty-input').forEach(input => input.value = '0');
                        closeConfirmModal();
                        logout(); // 自動登出
                    } else {
                        alert("❌ 儲存失敗：" + data.message);
                    }
                })
                .catch(err => alert("網路異常或跨域被阻擋：" + err))
                .finally(() => {
                    btnFinalConfirm.disabled = false;
                    btnFinalConfirm.textContent = '確定送出';
                });
        }


        // ==========================================
        // 啟動入口
        // ==========================================
        window.addEventListener('load', initDatabase);

    </script>
</body>

</html>
